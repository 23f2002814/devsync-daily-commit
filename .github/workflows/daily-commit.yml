name: Daily Commit

on:
  schedule:
    - cron: '17 4 * * *'   # once per day at 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 23f2002814@ds.study.iitm.ac.in
        run: echo "Required step name present"

      - name: Update daily file
        run: |
          mkdir -p logs
          echo "Run at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> logs/daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/daily-log.txt
          git commit -m "chore: daily automated commit $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
